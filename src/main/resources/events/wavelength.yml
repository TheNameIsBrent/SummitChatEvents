# ══════════════════════════════════════════════════════
#  Wavelength Event — Settings
#  Delete this file to reset all settings to defaults.
#
#  Syntax:
#    &#RRGGBB or <#RRGGBB>                      — hex colour
#    <gradient:#RRGGBB:#RRGGBB>text</gradient>  — gradient
#    <center>rest of line                       — centre line in chat
#  Placeholders: %prefix%  %player%  %players%  %average%
#                %scale_min%  %scale_max%  %prompt%  %seconds%  %prize%
# ══════════════════════════════════════════════════════

min-players: 3

reward:
  command:      "give %player% emerald 3"
  display-name: "&#a9ffa93x Emerald"

rounds:
  round1-duration: 15
  round2-duration: 10
  round3-duration: 5

scales:
  - scale-min: "Worst mob"
    scale-max: "Best mob"
    prompts:
      - "Creeper"
      - "Zombie"
      - "Skeleton"
      - "Enderman"
      - "Blaze"

  - scale-min: "Useless item"
    scale-max: "Most useful item"
    prompts:
      - "Stick"
      - "Feather"
      - "Diamond Pickaxe"
      - "Crafting Table"
      - "Bucket"

  - scale-min: "Easy biome"
    scale-max: "Hardest biome to survive in"
    prompts:
      - "Plains"
      - "Desert"
      - "Nether Wastes"
      - "Deep Dark"
      - "Mushroom Island"

messages:
  banner-top:    "<center><gradient:#B400FF:#FF00FF>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
  announce:      "<center><gradient:#B400FF:#FF00FF>&l≋ WAVELENGTH EVENT ≋</gradient>"
  banner-bottom: "<center><gradient:#FF00FF:#B400FF>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
  rules:         "<center>&#AAAAAA▸ Place the prompt on the scale. &#FF6B6BType 0–100."
  here-we-go:    "<center><gradient:#00FF87:#00CFFF>&l» Here we go! «</gradient>"

  scale:         "%prefix%&#AAAAAA Scale: <gradient:#FF00FF:#B400FF>&l%scale_min%</gradient> &#FFFFFF⟷ <gradient:#B400FF:#FF00FF>&l%scale_max%</gradient>"
  prompt:        "<center><gradient:#FF00FF:#B400FF>&l⚡ %prompt% ⚡</gradient>"

  round-2-start:   "%prefix%<gradient:#FFD700:#FF8C00>&lTie!</gradient> &eRound 2 — only these players continue: &6%players%"
  final-round:     "%prefix%<gradient:#FF4444:#FF0000>&lFinal Round!</gradient> &eLast chance — remaining: &6%players%"

  round-result-single: "%prefix%<gradient:#FFD700:#FF8C00>&lWinner:</gradient> &6&l%player% &#AAAAAA(average &#FFD700%average%&#AAAAAA)"
  round-result-tie:    "%prefix%<gradient:#FF4444:#FF8C00>&lIt's a tie!</gradient> &e%players% &#AAAAAA(average &#FFD700%average%&#AAAAAA)"

  guessing-over:   "<center><gradient:#FFD700:#FF8C00>&l✨ Ohhh, lots of guesses! Here comes the result...</gradient>"

  tie-eliminated:  "%prefix%&#FF4444You have been eliminated!"
  tie-advanced:    "%prefix%&#00FF87You advanced to the next round!"
  no-winner:       "%prefix%&cThe event ended &7— &cnobody scored!"

  # Public winner announcement — %player% or %players% for ties, %prize%
  winner-banner-top:    "<center><gradient:#B400FF:#FF00FF>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
  winner-line:          "<center><gradient:#B400FF:#FF00FF>&l🏆 %player% WINS! 🏆</gradient>"
  winner-prize-line:    "<center>&#AAAAAA Prize: %prize%"
  winner-banner-bottom: "<center><gradient:#FF00FF:#B400FF>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
  # For multiple winners (tie on final round)
  winner-multi-line:    "<center><gradient:#B400FF:#FF00FF>&l🏆 %players% WIN! 🏆</gradient>"

  guess-ack:       "%prefix%&#AAAAAA Your guess &#FFD700%guess%&#AAAAAA has been recorded!"
  countdown:       "%prefix%&#FF6B6B%seconds%s remaining!"

  # Private message sent only to each winner
  reward-private:  "%prefix%<gradient:#B400FF:#FF00FF>&lCongratulations!</gradient> &eYou won %prize%&e!"
