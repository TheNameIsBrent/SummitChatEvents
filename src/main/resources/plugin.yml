name: SummitChatEvents
version: '${version}'
main: com.summit.summitchatevents.SummitChatEventsPlugin
api-version: '1.21'
description: A Spigot/Paper plugin for advanced chat event handling.
author: Summit
website: https://github.com/your-org/summit-chat-events

commands:
  summitevent:
    description: Root command for SummitChatEvents.
    usage: /summitevent <start> <event-name>
    permission: summitevents.use

permissions:
  summitevents.use:
    description: Allows access to the /summitevent command.
    default: op
  summitevents.start:
    description: Allows starting a Summit event via /summitevent start <name>.
    default: op
  summitevents.play:
    description: Allows participating in CountUp events. Not required for Wavelength (everyone joins).
    default: true
  summitevents.overridechat:
    description: Bypasses the chat block during an active event; can still play.
    default: op
  summitevents.reload:
    description: Allows reloading the plugin configuration via /summitevent reload.
    default: op
