# ══════════════════════════════════════════════════════
#  SummitChatEvents — Global Configuration
#
#  Event-specific settings live in their own files:
#    plugins/SummitChatEvents/events/count.yml
#    plugins/SummitChatEvents/events/wavelength.yml
#    plugins/SummitChatEvents/events/headsortails.yml
#
#  Delete any of those files to reset them to defaults.
#  This file only contains settings shared by all events.
# ══════════════════════════════════════════════════════

# Prefix injected wherever %prefix% appears in any message.
prefix: "&6[&eSummitEvents&6]&r "

# Verbose console logging.
debug: false

# Broadcast when an admin forcibly stops an event with /summitevent stop.
stopped-message: "%prefix%&cThe event has been stopped by an administrator."
