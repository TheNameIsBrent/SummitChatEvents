# ══════════════════════════════════════════════════════
#  SummitChatEvents — Configuration
#  Color codes : use & for legacy codes (&a, &c, &e, &l …)
#  Placeholders: %prefix%  = the prefix value below
#                %player%  = player / winner name
#                %number%  = last number reached (count event)
#                %round%   = current round     (wavelength event)
# ══════════════════════════════════════════════════════

# Prefix injected wherever %prefix% appears in any message.
prefix: "&6[&eSummitEvents&6]&r "

# Set to true for verbose console output.
debug: false

events:

  # ── Count Up ───────────────────────────────────────
  count:
    min-duration: 30
    max-duration: 90
    reward-command: "give %player% diamond 3"

    messages:
      announce:   "%prefix%&e&lA Count Up event is about to begin! Get ready!"
      rules:      "%prefix%&7How it works: &fType the next number. No two in a row!"
      here-we-go: "%prefix%&a&lHere we go!"
      no-winner:  "%prefix%&cThe event ended &7— &cnobody scored!"
      winner:     "%prefix%&aEvent over! &eWinner: &6&l%player% &awith &e%number%&a. Well played!"
      reward:     "%prefix%&6%player% &ehas been rewarded for winning!"

  # ── Wavelength ─────────────────────────────────────
  wavelength:
    max-rounds: 5

    messages:
      announce:   "%prefix%&d&lA Wavelength event is starting! Get ready to guess!"
      rules:      "%prefix%&7How it works: &fGuess a number between 1 and 100. Closest wins the round!"
      here-we-go: "%prefix%&a&lHere we go!"
      round-start: "%prefix%&eRound &6&l%round%&e has started! Type your guess (1-100)."
      no-winner:  "%prefix%&cThe event ended &7— &cnobody scored!"
      winner:     "%prefix%&aEvent over! &eWinner: &6&l%player%&a. Well played!"
      reward:     "%prefix%&6%player% &ehas been rewarded for winning Wavelength!"
    reward-command: "give %player% emerald 3"
