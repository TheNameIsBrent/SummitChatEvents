# ══════════════════════════════════════════════════════
#  SummitChatEvents — Configuration
#
#  Color codes : & followed by a code (&a, &c, &e, &l …)
#  Placeholders available in ALL messages:
#    %prefix%     — the prefix value defined below
#  Additional per-event placeholders documented inline.
# ══════════════════════════════════════════════════════

# Prefix injected wherever %prefix% appears in any message.
prefix: "&6[&eSummitEvents&6]&r "

# Verbose console logging.
debug: false

# Broadcast when an admin forcibly stops an event with /summitevent stop.
stopped-message: "%prefix%&cThe event has been stopped by an administrator."

events:

  # ── Count Up ─────────────────────────────────────────────────────────────
  # Players type the next integer in sequence. No two in a row.
  count:
    min-duration: 30   # seconds
    max-duration: 90   # seconds
    reward-command: "give %player% diamond 3"

    messages:
      announce:   "%prefix%&e&lA Count Up event is about to begin! Get ready!"
      rules:      "%prefix%&7Type the next number in chat. You can't go twice in a row!"
      here-we-go: "%prefix%&a&lHere we go!"
      no-winner:  "%prefix%&cThe event ended &7— &cnobody scored!"
      winner:     "%prefix%&aEvent over! &eWinner: &6&l%player% &awith &e%number%&a. Well played!"
      reward:     "%prefix%&6%player% &ehas been rewarded for winning Count Up!"

  # ── Wavelength ───────────────────────────────────────────────────────────
  # Players are shown a scale (min ↔ max) and a prompt, then type a
  # number 1–100 placing the prompt on that scale. Closest to the hidden
  # target wins the round.
  #
  # Placeholders available in messages:
  #   %round%      — current round number
  #   %player%     — player / winner name
  #   %guess%      — a player's guess value
  #   %target%     — the secret target (shown at round end)
  #   %scale_min%  — low-end label of the active scale
  #   %scale_max%  — high-end label of the active scale
  #   %prompt%     — the active prompt word / phrase
  wavelength:
    reward-command: "give %player% emerald 3"

    # Per-round durations in seconds.
    # Keys must start with "round" and be in lexicographic order.
    # If the event has more rounds than entries, the last duration is reused.
    rounds:
      round1-duration: 40
      round2-duration: 30
      round3-duration: 20

    # Scales: each entry has a min label, a max label, and a list of prompts.
    # A random scale is chosen each round; a random prompt from that scale is shown.
    scales:
      - scale-min: "Worst mob"
        scale-max: "Best mob"
        prompts:
          - "Creeper"
          - "Zombie"
          - "Skeleton"
          - "Enderman"
          - "Blaze"

      - scale-min: "Useless item"
        scale-max: "Most useful item"
        prompts:
          - "Stick"
          - "Feather"
          - "Diamond Pickaxe"
          - "Crafting Table"
          - "Bucket"

      - scale-min: "Easy biome"
        scale-max: "Hardest biome to survive in"
        prompts:
          - "Plains"
          - "Desert"
          - "Nether Wastes"
          - "Deep Dark"
          - "Mushroom Island"

    messages:
      announce:     "%prefix%&d&lA Wavelength event is starting! Think carefully..."
      rules:        "%prefix%&7Place the prompt on the scale by typing a number &e1&7-&e100&7."
      here-we-go:   "%prefix%&a&lHere we go!"
      scale:        "%prefix%&7Scale: &e%scale_min% &7<-> &e%scale_max%"
      prompt:       "%prefix%&fPrompt: &d&l%prompt%"
      # Shown after each round (average and closest player)
      round-result: "%prefix%&eThe average guess was &6%average%&e. Closest: &6&l%player% &e(guessed &6%guess%&e)!"
      # Broadcast when 3+ players tie and the event continues
      # Shown before round 2 starts (3+ tied after round 1)
      round-2-start: "%prefix%&6&lTie! &eRound 2 — only tied players continue: &6%players%"
      # Shown before the final round starts (3+ tied after round 2)
      final-round: "%prefix%&c&lFinal Round! &eLast chance — only tied players remain: &6%players%"
      tie-continues: "%prefix%&6&lIt's a tie! &eThe following players continue: &6%players%"
      # Private message to players who are eliminated after a tie round
      tie-eliminated: "%prefix%&cYou have been eliminated. Better luck next time!"
      # Private message to players who advance after a tie round
      tie-advanced: "%prefix%&aYou advanced to the next round! Place your guess again."
      # Shown when 3+ players tie on the final round — all win together
      multiple-winners: "%prefix%&6&lIt's a tie! &eAll tied players win: &6%players%"
      no-winner:    "%prefix%&cThe event ended &7— &cnobody scored!"
      winner:       "%prefix%&aEvent over! &eWinner: &6&l%player%&a!"
      reward:       "%prefix%&6%player% &ehas been rewarded for winning Wavelength!"
      guess-ack:    "%prefix%&7Your guess &e%guess%&7 has been recorded. Wait for the round to end!"
      # Countdown warning — %seconds% = seconds remaining
      countdown:    "%prefix%&e%seconds% seconds remaining!"
      # Shown when guessing closes, before the result reveal
      guessing-over: "%prefix%&6Ohhh, we got a lot of guesses... here comes the winner!"
      # Combined reward message when multiple winners share the prize — %players% = comma-list
      reward-multiple: "%prefix%&6%players% &ehave all been rewarded for winning Wavelength!"
